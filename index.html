<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Laundry Reservation</title>
</head>

<body>

<h1>Laundry Reservation</h1>

<label>Date</label>
<input type="date" id="date">

<br><br>

<label>Time</label>
<select id="time">
<option>18:00</option>
<option>19:00</option>
<option>20:00</option>
<option>21:00</option>
</select>

<br><br>

<label>Name</label>
<select id="user">
<option>So</option>
<option>Daito</option>
<option>Takuma</option>
<option>Hozumi</option>
<option>Kosuke</option>
<option>Rio</option>
<option>Kosei</option>
<option>Masato</option>
</select>

<br><br>

<button onclick="reserve()">Reserve</button>

<script>

function reserve(){

const url = "https://script.google.com/macros/s/AKfycbypaF4kzybUo9w0B81mnEWBWmnFLF1oGIZ9mIaUOdNSh-S8-iDBwmA1IWthpYyXRv_d/exec";

const data = {
date: document.getElementById("date").value,
time: document.getElementById("time").value,
user: document.getElementById("user").value
};

fetch(url,{
method:"POST",
body: JSON.stringify(data)
})
.then(res=>res.text())
.then(data=>alert("Reservation Complete"));

}

</script>

</body>
</html>
