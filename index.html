<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Laundry Reservation</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
}

.container{
background:white;
width:360px;
margin:auto;
margin-top:40px;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

select,input,button{
width:100%;
padding:10px;
margin-top:10px;
font-size:16px;
}

button{
background:#4CAF50;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#45a049;
}

#message{
margin-top:15px;
font-weight:bold;
}

.slot{
padding:8px;
margin-top:4px;
border-radius:6px;
color:white;
}

.free{
background:#4CAF50;
}

.taken{
background:#e53935;
}

</style>

</head>

<body>

<div class="container">

<h2>Laundry Reservation</h2>

<label>Date</label>
<input type="date" id="date" onchange="renderSlots()">


<label>Machine</label>
<select id="machine" onchange="renderSlots()">
<option value="">Select machine</option>
<option value="Washer">Washer</option>
<option value="Dryer">Dryer</option>
</select>


<label>Time</label>
<select id="time"></select>


<label>Name</label>
<select id="user">
<option value="">Select your name</option>
<option>So</option>
<option>Daito</option>
<option>Takuma</option>
<option>Hozumi</option>
<option>Kosuke</option>
<option>Rio</option>
<option>Kosei</option>
<option>Masato</option>
</select>


<button onclick="reserve()">Reserve</button>

<div id="message"></div>

<h3>Time Slots</h3>
<div id="slots"></div>

</div>

<script>

const url="https://script.google.com/macros/s/AKfycbypaF4kzybUo9w0B81mnEWBWmnFLF1oGIZ9mIaUOdNSh-S8-iDBwmA1IWthpYyXRv_d/exec";

const washerTimes=[
"06:30-07:10",
"07:10-07:50",
"17:00-17:40",
"17:40-18:20",
"18:20-19:00",
"19:00-19:40",
"19:40-20:20",
"20:20-21:00",
"21:00-21:40",
"21:40-22:20"
];

const dryerTimes=[
"06:30-08:00",
"17:00-19:00",
"19:00-21:00",
"21:00-22:30"
];

function renderSlots(){

const machine=document.getElementById("machine").value;
const date=document.getElementById("date").value;

if(!machine || !date) return;

const slotBox=document.getElementById("slots");
slotBox.innerHTML="";

let times=[];

if(machine==="Washer") times=washerTimes;
if(machine==="Dryer") times=dryerTimes;

const timeSelect=document.getElementById("time");
timeSelect.innerHTML="";

times.forEach(t=>{

const option=document.createElement("option");
option.value=t;
option.textContent=t;
timeSelect.appendChild(option);

const div=document.createElement("div");
div.className="slot free";
div.id="slot-"+t;
div.innerText=t+" (Free)";
slotBox.appendChild(div);

});

fetch(url)
.then(res=>res.json())
.then(data=>{

data.forEach(r=>{

const m=r[0];
const d=r[1];
const t=r[2];
const user=r[3];

if(m===machine && d===date){

const slot=document.getElementById("slot-"+t);

if(slot){
slot.className="slot taken";
slot.innerText=t+" (Reserved by "+user+")";
}

}

});

});

}

function reserve(){

const machine=document.getElementById("machine").value;
const date=document.getElementById("date").value;
const time=document.getElementById("time").value;
const user=document.getElementById("user").value;

if(!machine || !date || !time || !user){
document.getElementById("message").innerText="Please fill all fields";
return;
}

fetch(url,{
method:"POST",
body:JSON.stringify({machine,date,time,user})
})
.then(res=>res.json())
.then(data=>{

if(data.status==="OK"){
document.getElementById("message").innerText="OK: Reservation completed";
renderSlots();
}else{
document.getElementById("message").innerText="Reservation failed";
}

})
.catch(()=>{
document.getElementById("message").innerText="Error sending reservation";
});

}

</script>

</body>
</html>
