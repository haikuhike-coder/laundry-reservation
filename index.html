<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Laundry Reservation</title>

<style>

body{
font-family:Arial, sans-serif;
background:#f4f4f4;
text-align:center;
}

.container{
background:white;
width:340px;
margin:auto;
margin-top:40px;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

select,input,button{
width:100%;
padding:10px;
margin-top:10px;
font-size:16px;
}

button{
background:#4CAF50;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#45a049;
}

.reservations{
margin-top:30px;
text-align:left;
}

#message{
margin-top:15px;
font-weight:bold;
color:green;
}

</style>

</head>

<body>

<div class="container">

<h2>Laundry Reservation</h2>

<label>Date</label>
<input type="date" id="date">


<label>Machine</label>
<select id="machine" onchange="updateTimes()">
<option value="">Select machine</option>
<option value="Washer">Washer</option>
<option value="Dryer">Dryer</option>
</select>


<label>Time</label>
<select id="time">
<option value="">Select time</option>
</select>


<label>Name</label>
<select id="user">
<option value="">Select your name</option>
<option>So</option>
<option>Daito</option>
<option>Takuma</option>
<option>Hozumi</option>
<option>Kosuke</option>
<option>Rio</option>
<option>Kosei</option>
<option>Masato</option>
</select>


<button onclick="reserve()">Reserve</button>

<div id="message"></div>


<div class="reservations">

<h3>Current Reservations</h3>

<ul id="list"></ul>

</div>

</div>

<script>

const url = "https://script.google.com/macros/s/AKfycbypaF4kzybUo9w0B81mnEWBWmnFLF1oGIZ9mIaUOdNSh-S8-iDBwmA1IWthpYyXRv_d/exec";

const washerTimes = [
"06:30-07:10",
"07:10-07:50",
"17:00-17:40",
"17:40-18:20",
"18:20-19:00",
"19:00-19:40",
"19:40-20:20",
"20:20-21:00",
"21:00-21:40",
"21:40-22:20"
];

const dryerTimes = [
"06:30-08:00",
"17:00-19:00",
"19:00-21:00",
"21:00-22:30"
];

function updateTimes(){

const machine=document.getElementById("machine").value;
const timeSelect=document.getElementById("time");

timeSelect.innerHTML='<option value="">Select time</option>';

let times=[];

if(machine==="Washer"){
times=washerTimes;
}

if(machine==="Dryer"){
times=dryerTimes;
}

times.forEach(t=>{
const option=document.createElement("option");
option.value=t;
option.textContent=t;
timeSelect.appendChild(option);
});

}


function reserve(){

const machine=document.getElementById("machine").value;
const date=document.getElementById("date").value;
const time=document.getElementById("time").value;
const user=document.getElementById("user").value;

if(!machine || !date || !time || !user){
document.getElementById("message").innerText="Please fill all fields";
return;
}

fetch(url,{
method:"POST",
body:JSON.stringify({machine,date,time,user})
})
.then(res=>res.json())
.then(data=>{

if(data.status==="OK"){
document.getElementById("message").innerText="OK: Reservation completed";
loadReservations();
}else{
document.getElementById("message").innerText="Reservation failed";
}

})
.catch(()=>{
document.getElementById("message").innerText="Error sending reservation";
});

}


function loadReservations(){

fetch(url)
.then(res=>res.json())
.then(data=>{

const list=document.getElementById("list");
list.innerHTML="";

data.forEach(r=>{

const li=document.createElement("li");

li.textContent=r[0]+" | "+r[1]+" | "+r[2]+" | "+r[3];

list.appendChild(li);

});

});

}

loadReservations();

</script>

</body>
</html>
